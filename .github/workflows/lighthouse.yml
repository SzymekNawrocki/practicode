name: Lighthouse CI

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (e.g. https://practicode.dev or a Vercel preview URL)'
        required: true
        default: 'https://practicode.dev'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install LHCI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse against target URL
        run: |
          lhci autorun \
            --collect.url="${{ github.event.inputs.url }}" \
            --collect.url="${{ github.event.inputs.url }}/search" \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions."categories:accessibility"='["error",{"minScore":0.90}]' \
            --assert.assertions."categories:seo"='["error",{"minScore":0.95}]' \
            --assert.assertions."categories:best-practices"='["error",{"minScore":0.90}]' \
            --upload.target=temporary-public-storage
